openapi: 3.1.0
info:
  version: 1.0.0
  title: InvoiceExpress API
  description: |
    Typed client for the InvoiceXpress API. Covers invoices, invoice receipts,
    clients, items, taxes and SAF-T export.
    See https://invoicexpress.com/api-v2/documentation/getting-started
servers:
  - url: https://{account_name}.app.invoicexpress.com
    variables:
      account_name:
        default: "account_name"
tags:
  - name: Invoices
    description: |
      Create invoices, invoice receipts, simplified invoices, vat moss invoices, credit notes & debit notes and send them to your clients.
  - name: InvoicesReceipts
    description: |
      Create invoices, invoice receipts, simplified invoices, vat moss invoices, credit notes & debit notes and send them to your clients.
  - name: Estimates
    description: |
      Create quotes, proformas or fees notes and send them to your clients.
  - name: Guides
    description: |
      Create shippings, transports & devolutions and send them to your clients.
  - name: Clients
    description: |
      A Client is an entity you send invoices to.
  - name: Items
    description: |
      An Item is the product or service you invoice.
  - name: Sequences
    description: |
      A Sequence is used to group invoices in a sequential order.
  - name: Taxes
    description: |
      A Tax is applied to invoice items when creating invoices.
  - name: Accounts
    description: |
      Create, update and get info about your account.
  - name: SAFT
    description: |
      Create, update and get info about your account.
  - name: Treasury
    description: |
      Section dedicated to treasury movements.
paths:
  /invoice_receipts/{document-id}/email-document.json:
    put:
      tags:
        - InvoicesReceipts
      summary: Send document by email
      parameters:
        - name: api_key
          in: query
          required: true
          schema:
            type: string
        - name: document-id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: object
                  properties:
                    client:
                      type: object
                      properties:
                        email:
                          type: string
                          format: email
                        save:
                          type: string
                          enum: ["0", "1"]
                    subject:
                      type: string
                    body:
                      type: string
                    cc:
                      type: string
                      format: email
                    bcc:
                      type: string
                      format: email
                    logo:
                      type: string
                      enum: ["0", "1"]
      responses:
        "200":
          description: The email was sent successfully.
        "401":
          description: Access denied. The API Key parameter is missing or is incorrectly entered.
        "404":
          description: Not found. The supplied document-id doesn’t match any existing document.
        "422":
          description: Unprocessable Entity. Some parameters sent were incorrect.
  /invoice_receipts/{document-id}/change-state.json:
    put:
      tags:
        - InvoicesReceipts
      summary: Change the state of a document
      description: Changes the state of an invoice, simplified_invoice, invoice_receipt, credit_note, or debit_note.
      parameters:
        - name: document-id
          in: path
          required: true
          description: The unique identifier of the document.
          schema:
            type: integer
        - name: api_key
          in: query
          required: true
          description: Your API key.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                invoice_receipt:
                  type: object
                  properties:
                    state:
                      type: string
                      enum:
                        - finalized
                        - deleted
                        - canceled
                        - settled
                        - unsettled
                      description: The new state of the document.
                    message:
                      type: string
                      description: The reason for changing the state (required for cancellation).
              required:
                - invoice_receipt
      responses:
        "200":
          description: Successfully changed the document state.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Status of the request.
                    examples:
                      - success
                  message:
                    type: string
                    description: Details about the request outcome.
                    examples:
                      - State changed successfully.
        "400":
          description: Invalid request.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Status of the request.

  /invoice_receipts/{document-id}.json:
    get:
      tags:
        - InvoicesReceipts
      summary: Get Invoice
      parameters:
        - name: api_key
          in: query
          required: true
          schema:
            type: string
        - name: document-id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The invoice was returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "401":
          description: Access denied. The API Key parameter is missing or is incorrectly entered.
        "404":
          description: Not found. No invoice matches the supplied document-id.

  /api/pdf/{document-id}.json:
    get:
      tags:
        - InvoicesReceipts
      summary: Generate PDF
      parameters:
        - name: api_key
          required: true
          in: query
          schema:
            type: string
        - name: document-id
          in: path
          required: true
          schema:
            type: integer
        - name: second_copy
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: The request has been successfully processed.
        "202":
          description: The request will be processed. You need to keep requesting until you get a response with HTTP status code 200.
        "401":
          description: Access denied. The API Key parameter is missing or is incorrectly entered.
        "404":
          description: Not found. No document matches the supplied document-id.
        "422":
          description: Not acceptable. The document-id provided is in an invalid state.
  /invoice_receipts.json:
    post:
      tags:
        - InvoicesReceipts
      summary: Create an invoice_receipts
      parameters:
        - name: api_key
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceReceiptsRequest"
      responses:
        "201":
          description: Invoice was created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  invoice_receipts:
                    $ref: "#/components/schemas/Invoice"
        "401":
          description: Access denied. The API Key parameter is missing or is incorrectly entered.
        "409":
          description: Conflict. There’s an ongoing document creation with the provided UID.
        "422":
          description: Unprocessable Entity. Some parameters were incorrect.

  /invoices.json:
    get:
      tags:
        - Invoices
      summary: List all invoices
      parameters:
        - name: api_key
          in: query
          required: true
          schema:
            type: string
        - name: text
          in: query
          schema:
            type: string
        - name: type[]
          in: query
          required: true
          schema:
            type: array
            items:
              type: string
              enum:
                [
                  Invoice,
                  InvoiceReceipt,
                  SimplifiedInvoice,
                  VatMossInvoice,
                  CreditNote,
                  DebitNote,
                  Receipt,
                  CashInvoice,
                  VatMossReceipt,
                  VatMossCreditNote,
                ]
        - name: status[]
          in: query
          required: true
          schema:
            type: array
            items:
              type: string
              enum: [draft, sent, settled, canceled, second_copy]
        - name: date[from]
          in: query
          schema:
            type: string
            format: date
        - name: date[to]
          in: query
          schema:
            type: string
            format: date
        - name: due_date[from]
          in: query
          schema:
            type: string
            format: date
        - name: due_date[to]
          in: query
          schema:
            type: string
            format: date
        - name: total_before_taxes[from]
          in: query
          schema:
            type: number
        - name: total_before_taxes[to]
          in: query
          schema:
            type: number
        - name: non_archived
          in: query
          required: true
          schema:
            type: boolean
        - name: archived
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          required: true
          schema:
            type: integer
          description: Page number to retrieve.
        - name: per_page
          in: query
          required: true
          schema:
            type: integer
          description: Per_page number to retrieve.
        - name: reference
          in: query
          schema:
            type: string
      responses:
        "200":
          description: The client’s invoices
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoicesResponse"
        "401":
          description: Access denied. The API Key parameter is missing or is incorrectly entered.
    post:
      tags:
        - Invoices
      summary: Create an invoice
      description: Creates an invoice. Use the matching document-type endpoint for other documents (e.g. simplified_invoices, credit_notes, debit_notes).
      parameters:
        - name: api_key
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceRequest"
      responses:
        "201":
          description: Invoice was created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceResponse"
        "401":
          description: Access denied. The API Key parameter is missing or is incorrectly entered.
        "409":
          description: Conflict. There’s an ongoing document creation with the provided UID.
        "422":
          description: Unprocessable Entity. Some parameters were incorrect.

  /invoices/{document-id}.json:
    get:
      tags:
        - Invoices
      summary: Get an invoice
      parameters:
        - name: api_key
          in: query
          required: true
          schema:
            type: string
        - name: document-id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The invoice was returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceResponse"
        "401":
          description: Access denied. The API Key parameter is missing or is incorrectly entered.
        "404":
          description: Not found. No invoice matches the supplied document-id.
    put:
      tags:
        - Invoices
      summary: Update an invoice
      description: Updates a draft invoice. Only invoices in the draft state can be updated.
      parameters:
        - name: api_key
          in: query
          required: true
          schema:
            type: string
        - name: document-id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceRequest"
      responses:
        "200":
          description: Invoice was updated successfully.
        "401":
          description: Access denied. The API Key parameter is missing or is incorrectly entered.
        "404":
          description: Not found. No invoice matches the supplied document-id.
        "422":
          description: Unprocessable Entity. Some parameters were incorrect.

  /invoices/{document-id}/change-state.json:
    put:
      tags:
        - Invoices
      summary: Change the state of an invoice
      description: Changes the state of an invoice (finalized, deleted, canceled, settled).
      parameters:
        - name: document-id
          in: path
          required: true
          description: The unique identifier of the document.
          schema:
            type: integer
        - name: api_key
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - invoice
              properties:
                invoice:
                  type: object
                  properties:
                    state:
                      type: string
                      enum:
                        - finalized
                        - deleted
                        - canceled
                        - settled
                      description: The new state of the document.
                    message:
                      type: string
                      description: The reason for changing the state (required for cancellation).
      responses:
        "200":
          description: Successfully changed the document state.
        "401":
          description: Access denied. The API Key parameter is missing or is incorrectly entered.
        "404":
          description: Not found. The supplied document-id doesn’t match any existing document.
        "422":
          description: Unprocessable Entity. Some parameters sent were incorrect.

  /document/{document-id}/related_documents.json:
    get:
      tags:
        - Invoices
      summary: List related documents
      description: Returns the documents (receipts, credit notes, debit notes) related to the given document.
      parameters:
        - name: api_key
          in: query
          required: true
          schema:
            type: string
        - name: document-id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The related documents.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoicesResponse"
        "401":
          description: Access denied. The API Key parameter is missing or is incorrectly entered.
        "404":
          description: Not found. No document matches the supplied document-id.

  /documents/{document-id}/partial_payments.json:
    post:
      tags:
        - Invoices
      summary: Generate a payment (receipt)
      description: Generates a receipt for a (partial) payment of an invoice or simplified invoice.
      parameters:
        - name: api_key
          in: query
          required: true
          schema:
            type: string
        - name: document-id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - partial_payment
              properties:
                partial_payment:
                  type: object
                  properties:
                    payment_mechanism:
                      type: string
                      description: Payment method code (e.g. TB, MB, NU, CC).
                    note:
                      type: string
                    serie:
                      type: string
                    amount:
                      type: number
                    payment_date:
                      type: string
                      description: Payment date in dd/mm/yyyy format.
      responses:
        "201":
          description: The receipt was created successfully.
        "401":
          description: Access denied. The API Key parameter is missing or is incorrectly entered.
        "404":
          description: Not found. No document matches the supplied document-id.
        "422":
          description: Unprocessable Entity. Some parameters sent were incorrect.

  /clients.json:
    get:
      tags:
        - Clients
      summary: List all clients
      description: Retrieves a list of clients.
      parameters:
        - name: api_key
          in: query
          required: true
          schema:
            type: string
        - name: page
          in: query
          required: true
          schema:
            type: integer
          description: Page number to retrieve.
        - name: per_page
          in: query
          required: true
          schema:
            type: integer
          description: Number of clients per page.
      responses:
        "200":
          description: Clients List all
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientsResponse"
        "401":
          description: ACCESS DENIED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags:
        - Clients
      summary: Create a new client
      description: Creates a new client.
      parameters:
        - name: api_key
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientRequest"
      responses:
        "201":
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientResponse"
        "401":
          description: ACCESS DENIED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: UNPROCESSABLE ENTITY
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clients/{client-id}.json:
    get:
      tags:
        - Clients
      summary: Get a client by ID
      description: Retrieves a client by their ID.
      parameters:
        - name: api_key
          in: query
          required: true
          schema:
            type: string
        - name: client-id
          in: path
          required: true
          schema:
            type: integer
          description: The ID of the client you want to get.
      responses:
        "200":
          description: Clients Get
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientResponse"
        "401":
          description: ACCESS DENIED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: NOT FOUND
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags:
        - Clients
      summary: Update a client by ID
      description: Updates a client's information by their ID.
      parameters:
        - name: api_key
          in: query
          required: true
          schema:
            type: string
        - name: client-id
          in: path
          required: true
          schema:
            type: integer
          description: The ID of the client to be updated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientRequest"
      responses:
        "200":
          description: SUCCESS
        "401":
          description: ACCESS DENIED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: NOT FOUND
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: UNPROCESSABLE ENTITY
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clients/find-by-name.json:
    get:
      tags:
        - Clients
      summary: Find client by name
      description: Retrieves a client by their name.
      parameters:
        - name: api_key
          in: query
          required: true
          schema:
            type: string
        - name: client_name
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Client Get
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientResponse"
        "401":
          description: ACCESS DENIED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: NOT FOUND
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clients/find-by-code.json:
    get:
      tags:
        - Clients
      summary: Find client by code
      description: Retrieves a client by their code.
      parameters:
        - name: api_key
          in: query
          required: true
          schema:
            type: string
        - name: client_code
          in: query
          required: true
          schema:
            type: integer
          description: The client code you want to search.
      responses:
        "200":
          description: Client Get
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientResponse"
        "401":
          description: ACCESS DENIED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: NOT FOUND
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clients/{client-id}/invoices.json:
    post:
      tags:
        - Clients
      summary: List invoices for a client
      description: Retrieves a list of invoices for a specific client.
      parameters:
        - name: api_key
          in: query
          required: true
          schema:
            type: string
        - name: client-id
          in: path
          required: true
          schema:
            type: integer
          description: Filter invoices for this client.
        - name: page
          in: query
          schema:
            type: integer
          description: You can ask for a specific page of invoices. Defaults to 1.
        - name: per_page
          in: query
          schema:
            type: integer
          description: You can specify how many results you want to fetch. Defaults to 10 or value defined in account settings (10, 20 or 30).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filter:
                  type: object
                  properties:
                    status:
                      type: array
                      items:
                        type: string
                    by_type:
                      type: array
                      items:
                        type: string
                    archived:
                      type: array
                      items:
                        type: string
      responses:
        "200":
          description: The client’s invoices
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoicesResponse"
        "401":
          description: ACCESS DENIED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: NOT FOUND
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/export_saft.json:
    get:
      tags:
        - SAFT
      summary: Export SAF-T
      description: Generates the SAF-T file for a specific date (month and years). The first response given will have a HTTP 202 code, meaning the generation was started. You need to keep requesting until you get a response with HTTP status code 200, and the URL to download the file in the message body.
      parameters:
        - name: api_key
          in: query
          required: true
          schema:
            type: string
        - name: month
          in: query
          required: true
          schema:
            type: string
          example: "10"
        - name: years
          in: query
          required: true
          schema:
            type: string
          example: "2017"
      responses:
        "200":
          description: The link to download your SAF-T file.
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    examples:
                      - "https://some.url"
        "202":
          description: Your SAF-T file is being generated. You need to keep requesting until you get a response with HTTP status code 200.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    examples:
                      - "The SAF-T file generation was started. Please keep requesting until you get back the url."
        "422":
          description: Some parameters sent in the request were not valid.
        "500":
          description: The SAF-T file generation failed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    examples:
                      - "Error generating SAF-T. Please try again."
  /taxes.json:
    get:
      tags:
        - Taxes
      summary: List all taxes
      description: Retrieves a list of taxes.
      parameters:
        - name: api_key
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Taxes List all
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxesResponse"
        "401":
          description: ACCESS DENIED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags:
        - Taxes
      summary: Create a new tax
      description: Creates a new tax.
      parameters:
        - name: api_key
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaxRequest"
      responses:
        "201":
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxResponse"
        "401":
          description: ACCESS DENIED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: UNPROCESSABLE ENTITY
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /taxes/{tax-id}.json:
    get:
      tags:
        - Taxes
      summary: Get a tax by ID
      description: Retrieves a tax by their ID.
      parameters:
        - name: api_key
          in: query
          required: true
          schema:
            type: string
        - name: tax-id
          in: path
          required: true
          schema:
            type: integer
          description: The ID of the tax you want to get.
      responses:
        "200":
          description: Tax Get
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxResponse"
        "401":
          description: ACCESS DENIED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: NOT FOUND
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags:
        - Taxes
      summary: Update a tax by ID
      description: Updates a tax's information by its ID.
      parameters:
