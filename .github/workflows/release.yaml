name: Release

# Releases are NOT cut on merge to main — pushes only run CI (ci.yaml).
# Instead this job runs on a schedule (every 4 hours): it determines the next
# version from the conventional commits since the last tag. Only if there is a
# release-worthy change (a feat/fix/breaking-change commit) does it create the
# git tag, publish the package to BOTH the public npm registry and GitHub
# Packages, and cut a GitHub Release. If nothing releasable has landed since
# the last tag, `new_version` is empty and every step is skipped — a no-op.
#
# To FORCE a release (e.g. after a docs-only change), trigger it manually and
# pick a bump level:
#   * GitHub UI: Actions > Release > "Run workflow" > set "bump" to patch/minor/major.
#   * CLI:       gh workflow run release.yaml -f bump=patch
# With `bump=auto` (the default) a manual run behaves exactly like the schedule:
# it releases only if a feat/fix/breaking-change commit has landed.
#
# Two publish targets, both token-authenticated. The "Configure registry auth"
# step writes the per-registry _authToken lines into a runtime .npmrc (the
# tokens are GitHub Actions secret expressions rendered into the script, never
# committed):
#  * npm (registry.npmjs.org) — classic automation token in the NPM_TOKEN repo
#    secret. Create it at npmjs.com > Access Tokens (type "Automation", or a
#    granular token with publish on @diogopms/invoice-express-js), then add it
#    under repo Settings > Secrets and variables > Actions as NPM_TOKEN.
#  * GitHub Packages (npm.pkg.github.com) — the built-in GITHUB_TOKEN.
on:
  schedule:
    - cron: "0 */4 * * *" # every 4 hours
  workflow_dispatch:
    inputs:
      bump:
        description: "Force a release with this bump when no releasable commits exist (auto = behave like the schedule)"
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
        default: auto

# Never run two releases at once.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write # publish to GitHub Packages

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          fetch-depth: 0

      - name: Determine next version
        id: tag
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: ""
          # `default_bump` is the bump used only when NO conventional commit
          # since the last tag dictates one. Normally `false`, so non-releasable
          # commits (docs, test, ci, chore, …) leave `new_version` empty and the
          # release is skipped. A manual run can override it: passing
          # bump=patch|minor|major forces that bump even on a docs-only change.
          # A feat/fix/breaking-change commit always wins over this fallback.
          default_bump: ${{ (github.event_name == 'workflow_dispatch' && inputs.bump != 'auto') && inputs.bump || false }}
          release_branches: main

      - name: Install Node.js
        if: steps.tag.outputs.new_version
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        name: Install pnpm
        if: steps.tag.outputs.new_version
        with:
          run_install: false

      - name: Get pnpm store directory
        if: steps.tag.outputs.new_version
        id: pnpm-cache-dir-path
        run: echo "dir=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        name: Setup pnpm cache
        if: steps.tag.outputs.new_version
        with:
          path: ${{ steps.pnpm-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store

      - name: Install dependencies
        if: steps.tag.outputs.new_version
        run: pnpm install --frozen-lockfile

      - name: Set package version
        if: steps.tag.outputs.new_version
        run: npm version "${{ steps.tag.outputs.new_version }}" --no-git-tag-version --allow-same-version

      - name: Build
        if: steps.tag.outputs.new_version
        run: pnpm build

      # Write per-registry auth into a runtime .npmrc. The tokens are GitHub
      # Actions secret expressions substituted into the script at render time
      # (not shell env vars); this file lives only on the runner.
      - name: Configure registry auth
        if: steps.tag.outputs.new_version
        run: |
          {
            echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}"
            echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}"
          } >> .npmrc

      - name: Publish to npm
        if: steps.tag.outputs.new_version
        run: npm publish --registry=https://registry.npmjs.org

      - name: Publish to GitHub Packages
        if: steps.tag.outputs.new_version
        run: npm publish --registry=https://npm.pkg.github.com

      # Remove the token file as soon as publishing is done, so later steps
      # (e.g. the release-creation action) never see the credentials on disk.
      - name: Remove registry credentials
        if: always()
        run: rm -f .npmrc

      - name: Create GitHub Release
        if: steps.tag.outputs.new_version
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          token: ${{ secrets.GITHUB_TOKEN }}
