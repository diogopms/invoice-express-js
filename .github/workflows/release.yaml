name: Release

# Releases are NOT cut on merge to main — pushes only run CI (ci.yaml).
# Instead this job runs on a schedule (every 4 hours): it determines the next
# version from the conventional commits since the last tag. Only if there is a
# release-worthy change (a feat/fix/breaking-change commit) does it create the
# git tag, publish the package and cut a GitHub Release. If nothing releasable
# has landed since the last tag, `new_version` is empty and every step below is
# skipped — the run is a no-op.
on:
  schedule:
    - cron: "0 */4 * * *" # every 4 hours
  workflow_dispatch: {} # allow a manual release run

# Never run two releases at once.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Determine next version
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: ""
          # Don't fall back to a patch bump for non-releasable commits (docs,
          # test, ci, chore, …). With `false`, the action only emits a new
          # version when a feat/fix/breaking-change commit has landed; otherwise
          # `new_version` is empty and the release is skipped entirely.
          default_bump: false
          release_branches: main

      - name: Install Node.js
        if: steps.tag.outputs.new_version
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        if: steps.tag.outputs.new_version
        with:
          run_install: false

      - name: Get pnpm store directory
        if: steps.tag.outputs.new_version
        id: pnpm-cache-dir-path
        run: echo "dir=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        name: Setup pnpm cache
        if: steps.tag.outputs.new_version
        with:
          path: ${{ steps.pnpm-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store

      - name: Install dependencies
        if: steps.tag.outputs.new_version
        run: pnpm install --frozen-lockfile

      - name: Set package version
        if: steps.tag.outputs.new_version
        run: npm version "${{ steps.tag.outputs.new_version }}" --no-git-tag-version --allow-same-version

      - name: Build
        if: steps.tag.outputs.new_version
        run: pnpm build

      - name: Publish
        if: steps.tag.outputs.new_version
        run: pnpm publish --registry=https://npm.pkg.github.com --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.tag.outputs.new_version
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          token: ${{ secrets.GITHUB_TOKEN }}
