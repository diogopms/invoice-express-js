name: Release

# Releases are NOT cut on merge to main — pushes only run CI (ci.yaml).
# Instead this job runs on a schedule (every 4 hours): it determines the next
# version from the commits since the last tag, and only if there is something
# new does it tag, build and publish the package.
on:
  schedule:
    - cron: "0 */4 * * *" # every 4 hours
  workflow_dispatch: {} # allow a manual release run

# Never run two releases at once.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Determine next version
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: ""
          default_bump: patch
          release_branches: main

      - name: Install Node.js
        if: steps.tag.outputs.new_version
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        if: steps.tag.outputs.new_version
        with:
          run_install: false

      - name: Get pnpm store directory
        if: steps.tag.outputs.new_version
        id: pnpm-cache-dir-path
        run: echo "dir=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        name: Setup pnpm cache
        if: steps.tag.outputs.new_version
        with:
          path: ${{ steps.pnpm-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store

      - name: Install dependencies
        if: steps.tag.outputs.new_version
        run: pnpm install --frozen-lockfile

      - name: Set package version
        if: steps.tag.outputs.new_version
        run: npm version "${{ steps.tag.outputs.new_version }}" --no-git-tag-version --allow-same-version

      - name: Build
        if: steps.tag.outputs.new_version
        run: pnpm build

      - name: Publish
        if: steps.tag.outputs.new_version
        run: pnpm publish --registry=https://npm.pkg.github.com --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
